version: '3.8'

services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    image: sicare-app
    container_name: sicare_app
    restart: unless-stopped
    ports:
      - "8000:80"
    volumes:
      - .:/var/www/html
    environment:
      - APACHE_DOCUMENT_ROOT=/var/www/html/public
    depends_on:
      - db
    networks:
      - sicare-network

  db:
    image: mysql:8.0
    container_name: sicare_db
    restart: unless-stopped
    environment:
      MYSQL_DATABASE: ${DB_DATABASE:-sicare_db}
      MYSQL_ROOT_PASSWORD: ${DB_PASSWORD:-root}
    ports:
      - "3306:3306"
    volumes:
      - dbdata:/var/lib/mysql
    networks:
      - sicare-network

networks:
  sicare-network:
    driver: bridge

volumes:
  dbdata:
